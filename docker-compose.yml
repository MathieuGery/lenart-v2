services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lenart
      POSTGRES_PASSWORD: lenart
      POSTGRES_DB: lenart
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: lenart
      MINIO_ROOT_PASSWORD: lenartminio
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      mc alias set local http://minio:9000 lenart lenartminio;
      mc mb --ignore-existing local/lenart-photos;
      mc anonymous set download local/lenart-photos;
      "

volumes:
  pgdata:
  minio_data:
